name: iOS App Store Upload

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload the exported IPA to App Store Connect
        required: true
        type: boolean
        default: true
      build_number:
        description: Optional CFBundleVersion override. Defaults to the GitHub run number.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-app-store-upload
  cancel-in-progress: false

env:
  PROJECT_PATH: DamageScopeAI.xcodeproj
  SCHEME: DamageScopeAI
  CONFIGURATION: Release
  BUNDLE_IDENTIFIER: damagescopeai.app

jobs:
  archive-and-upload:
    name: Archive and upload iOS build
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          for xcode_path in \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.1.app \
            /Applications/Xcode_26.0.1.app; do
            if [ -d "${xcode_path}" ]; then
              echo "DEVELOPER_DIR=${xcode_path}/Contents/Developer" >> "${GITHUB_ENV}"
              "${xcode_path}/Contents/Developer/usr/bin/xcodebuild" -version
              exit 0
            fi
          done

          echo "::error::Xcode 26 is required for App Store upload, but no Xcode 26 installation was found."
          exit 1

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Validate App Store Connect secrets
        run: |
          set -euo pipefail
          missing=0
          for name in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_ISSUER_ID APP_STORE_CONNECT_API_PRIVATE_KEY APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          key_path="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          if [[ "${APP_STORE_CONNECT_API_PRIVATE_KEY}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${APP_STORE_CONNECT_API_PRIVATE_KEY}" > "${key_path}"
          else
            printf '%s' "${APP_STORE_CONNECT_API_PRIVATE_KEY}" | base64 --decode > "${key_path}"
          fi

          chmod 600 "${key_path}"
          mkdir -p "${HOME}/private_keys"
          cp "${key_path}" "${HOME}/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "ASC_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -resolvePackageDependencies

      - name: Archive app
        run: |
          set -euo pipefail
          build_number="${{ inputs.build_number }}"
          if [ -z "${build_number}" ]; then
            build_number="${GITHUB_RUN_NUMBER}"
          fi

          archive_path="${RUNNER_TEMP}/DamageScopeAI.xcarchive"
          archive_log="${RUNNER_TEMP}/xcodebuild-archive.log"
          echo "ARCHIVE_PATH=${archive_path}" >> "${GITHUB_ENV}"
          echo "Using build number ${build_number}"

          set +e
          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -destination "generic/platform=iOS" \
            -archivePath "${archive_path}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="${BUNDLE_IDENTIFIER}" \
            CURRENT_PROJECT_VERSION="${build_number}" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${ASC_KEY_PATH}" \
            -authenticationKeyID "${APP_STORE_CONNECT_API_KEY_ID}" \
            -authenticationKeyIssuerID "${APP_STORE_CONNECT_API_ISSUER_ID}" \
            clean archive 2>&1 | tee "${archive_log}"
          archive_status=${PIPESTATUS[0]}
          set -e

          if [ "${archive_status}" -ne 0 ]; then
            echo "::group::Swift and Xcode diagnostics"
            grep -nE "error:|warning:|:[0-9]+:[0-9]+:" "${archive_log}" | tail -n 240 || true
            echo "::endgroup::"
            exit "${archive_status}"
          fi

      - name: Upload archive diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: DamageScopeAI-Archive-Diagnostics-${{ github.run_number }}
          path: ${{ runner.temp }}/xcodebuild-archive.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Create export options
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          set -euo pipefail
          export_path="${RUNNER_TEMP}/export"
          mkdir -p "${export_path}"

          xcodebuild \
            -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${export_path}" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${ASC_KEY_PATH}" \
            -authenticationKeyID "${APP_STORE_CONNECT_API_KEY_ID}" \
            -authenticationKeyIssuerID "${APP_STORE_CONNECT_API_ISSUER_ID}" | tee "${RUNNER_TEMP}/xcodebuild-export.log"

          ipa_path="$(find "${export_path}" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "${ipa_path}" ]; then
            echo "::error::No IPA was exported."
            exit 1
          fi
          echo "IPA_PATH=${ipa_path}" >> "${GITHUB_ENV}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamageScopeAI-AppStore-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/export/*.ipa
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          if-no-files-found: error
          retention-days: 14

      - name: Upload to App Store Connect
        if: ${{ inputs.upload }}
        run: |
          set -euo pipefail
          xcrun altool \
            --upload-app \
            -f "${IPA_PATH}" \
            -t ios \
            --apiKey "${APP_STORE_CONNECT_API_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_API_ISSUER_ID}" \
            --output-format xml
